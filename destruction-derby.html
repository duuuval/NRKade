<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DESTRUCTION DERBY - Monster Trucks &amp; Spaceships</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:'Trebuchet MS','Comic Sans MS',Tahoma,sans-serif;
    touch-action:none;
  }

  #gameWrapper {
    display:flex; flex-direction:column;
    width:100vw; height:100vh;
  }

  /* ── TWO-ROW TOP BAR ── */
  #ui {
    flex:0 0 auto; width:100%;
    display:flex; flex-direction:column;
    background:rgba(0,0,0,0.75);
    pointer-events:none; z-index:10;
  }

  /* Row 1: back | pause | fullscreen */
  #uiRow1 {
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:6px 10px 4px;
    gap:8px;
  }
  #uiLeft  { display:flex; align-items:center; justify-content:flex-start; }
  #uiRight { display:flex; align-items:center; justify-content:flex-end; }
  #uiCenter { display:flex; align-items:center; justify-content:center; }

  /* Row 2: pips centered */
  #uiRow2 {
    display:flex; align-items:center; justify-content:center;
    gap:16px;
    padding:3px 10px 6px;
  }

  #backBtn {
    pointer-events:all;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.2);
    border-radius:7px; color:rgba(255,255,255,0.75);
    font-size:11px; font-weight:700; letter-spacing:0.5px;
    padding:5px 10px; cursor:pointer; text-decoration:none;
    display:none; white-space:nowrap; flex-shrink:0;
  }
  #backBtn:active { background:rgba(255,255,255,0.2); }

  /* pip rows sit inline, no labels during play */
  .hit-pips { display:flex; gap:4px; align-items:center; }
  .pip { width:13px; height:13px; border-radius:50%; border:1.5px solid; transition:transform 0.15s,opacity 0.15s; flex-shrink:0; }
  .pip.alive  { transform:scale(1);   opacity:1; }
  .pip.dead   { transform:scale(0.4); opacity:0.25; }
  .pip.player { background:#ff4422; border-color:#ff8866; box-shadow:0 0 4px #ff4422; }
  .pip.ai     { background:#00ff88; border-color:#88ffcc; box-shadow:0 0 4px #00ff88; }
  .pip.dead.player { background:#333; border-color:#555; box-shadow:none; }
  .pip.dead.ai     { background:#333; border-color:#555; box-shadow:none; }

  #pauseBtn {
    pointer-events:all;
    flex-shrink:0;
    background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.18);
    border-radius:7px; color:rgba(255,255,255,0.7);
    font-size:11px; font-weight:700; letter-spacing:0.5px;
    padding:5px 12px; height:32px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; white-space:nowrap;
  }
  #pauseBtn:active { background:rgba(255,255,255,0.22); color:white; }

  #fsBtn {
    pointer-events:all; flex-shrink:0;
    display:none;
    background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.2);
    border-radius:7px; color:rgba(255,255,255,0.7);
    font-size:11px; font-weight:700; letter-spacing:0.5px;
    padding:5px 10px; height:32px;
    align-items:center; justify-content:center;
    cursor:pointer; white-space:nowrap;
  }
  #fsBtn:active { background:rgba(255,255,255,0.2); }

  /* ── Canvas ── */
  #canvasArea {
    position:relative; flex:1 1 auto; min-height:0;
    display:flex; align-items:center; justify-content:center;
    background:#000; overflow:hidden;
  }
  canvas { display:block; max-width:100%; max-height:100%; }

  /* ── Controls: buttons sit at TOP of bar, dead space below ── */
  #controls {
    flex:0 0 auto;
    padding:10px 14px calc(16px + env(safe-area-inset-bottom, 0px));
    display:flex; justify-content:space-between; align-items:flex-start;
    background:rgba(0,0,0,0.75);
    pointer-events:none;
  }
  .steer-pad { display:flex; gap:8px; pointer-events:all; align-items:flex-start; }
  .right-pad  { display:flex; gap:10px; align-items:flex-start; pointer-events:all; }

  .ctrl-btn {
    background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.2);
    border-radius:14px; color:white; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none; transition:background 0.08s;
  }
  .ctrl-btn.pressed,.ctrl-btn:active { background:rgba(255,255,255,0.32); border-color:rgba(255,255,255,0.5); }
  .steer-btn { width:72px; height:72px; font-size:30px; }
  .gas-btn {
    width:80px; height:80px;
    background:rgba(0,200,80,0.85) !important;
    border-color:#00ff66 !important;
    box-shadow:0 0 16px rgba(0,255,80,0.6) !important;
    /* no content — pure green button */
  }
  .action-btn {
    border-radius:50%; border:2px solid rgba(255,255,255,0.2); color:white;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none;
  }
  #boostBtn { width:80px; height:80px; background:rgba(255,100,0,0.35); border-color:#ff6600; box-shadow:0 0 12px rgba(255,100,0,0.5); font-size:32px; }

  /* ── Flash / announce ── */
  #flashOverlay { position:absolute; inset:0; pointer-events:none; z-index:18; opacity:0; transition:opacity 0.08s; }
  #trickAnnounce {
    position:absolute; top:35%; left:50%; transform:translateX(-50%);
    font-weight:900; font-size:28px; color:#ffdd00;
    text-shadow:0 0 20px #ffaa00,2px 2px 0 #000;
    pointer-events:none; z-index:15; opacity:0; white-space:nowrap; transition:opacity 0.3s;
  }

  /* ── Overlay (title/pause/win/lose) ── */
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.88); z-index:20; gap:12px;
    text-align:center; box-sizing:border-box; padding:16px;
  }
  #overlay h1 { font-weight:900; font-size:clamp(24px,5vw,52px); letter-spacing:4px; line-height:1; font-style:italic; -webkit-text-stroke:1px rgba(255,255,255,0.3); }
  #overlay .subtitle { font-size:clamp(12px,2vw,17px); color:#aaa; letter-spacing:2px; padding:0 16px; }
  .win  { color:#ff4422; text-shadow:0 0 20px #ff4422; }
  .lose { color:#00ff88; text-shadow:0 0 20px #00ff88; }
  .start{ color:#ffdd00; text-shadow:0 0 20px #ffdd00; }
  .section-label { font-weight:900; font-size:11px; color:#777; letter-spacing:4px; margin-top:6px; margin-bottom:2px; text-transform:uppercase; }
  .world-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .world-btn {
    padding:8px 14px; border-radius:10px; border:2px solid;
    font-weight:900; font-size:14px; cursor:pointer; font-style:italic; letter-spacing:1px;
    pointer-events:all; transition:transform 0.1s,box-shadow 0.1s; text-align:center; line-height:1.3;
  }
  .world-btn:active { transform:scale(0.94); }
  .world-btn.trucks { background:rgba(139,90,20,0.25); border-color:#aa6622; color:#ddaa55; }
  .world-btn.space  { background:rgba(40,80,200,0.2);  border-color:#4466cc; color:#88aaff; }
  .world-btn.selected { transform:scale(1.08); box-shadow:0 0 16px currentColor; }
  .diff-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .diff-btn {
    padding:8px 14px; border-radius:10px; border:2px solid;
    font-weight:900; font-size:14px; cursor:pointer; font-style:italic; letter-spacing:1px;
    pointer-events:all; transition:transform 0.1s,box-shadow 0.1s;
  }
  .diff-btn:active { transform:scale(0.94); }
  .diff-btn.easy   { background:rgba(0,200,80,0.2);  border-color:#00cc55; color:#00ff77; }
  .diff-btn.medium { background:rgba(255,180,0,0.2); border-color:#ffaa00; color:#ffcc44; }
  .diff-btn.hard   { background:rgba(220,30,30,0.2); border-color:#cc2222; color:#ff4444; }
  .diff-btn.selected { transform:scale(1.08); box-shadow:0 0 16px currentColor; }
  #startBtn {
    margin-top:4px; padding:12px 32px;
    font-weight:900; font-size:20px; letter-spacing:3px; font-style:italic;
    background:linear-gradient(135deg,#cc1111,#ff4422);
    color:white; border:none; border-radius:12px; cursor:pointer;
    box-shadow:0 0 20px rgba(255,68,34,0.5); pointer-events:all;
  }

  /* HUD and controls hidden on menu screens, shown only during play */
  #ui, #controls { visibility:hidden; }
  body.playing #ui, body.playing #controls { visibility:visible; }
</style>
</head>
<body>
<div id="gameWrapper">
  <!-- TWO-ROW TOP BAR -->
  <div id="ui">
    <!-- Row 1: back | pause | fullscreen -->
    <div id="uiRow1">
      <div id="uiLeft"><a id="backBtn" href="index.html">← ARCADE</a></div>
      <div id="uiCenter"><div id="pauseBtn">⏸ PAUSE</div></div>
      <div id="uiRight"><div id="fsBtn">⛶ FULLSCREEN</div></div>
    </div>
    <!-- Row 2: pips centered -->
    <div id="uiRow2">
      <div class="hit-pips" id="playerPips"></div>
      <div class="hit-pips" id="aiPips"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvasArea">
    <canvas id="gameCanvas"></canvas>
    <div id="flashOverlay"></div>
    <div id="trickAnnounce"></div>
    <div id="overlay">
      <h1 class="start">DESTRUCTION DERBY</h1>
      <div class="section-label">PICK YOUR WORLD</div>
      <div class="world-btns">
        <div class="world-btn trucks selected" data-world="trucks">🛻 TRUCKS<br><small>Dirt Arena</small></div>
        <div class="world-btn space" data-world="space">🚀 SPACE<br><small>Starship Battle</small></div>
      </div>
      <div class="section-label">DIFFICULTY</div>
      <div class="diff-btns">
        <div class="diff-btn easy selected" data-diff="easy">🟢 EASY</div>
        <div class="diff-btn medium" data-diff="medium">🟡 MEDIUM</div>
        <div class="diff-btn hard" data-diff="hard">🔴 HARD</div>
      </div>
      <button id="startBtn">SMASH IT! 🛻</button>
    </div>
  </div>

  <!-- Controls: steer left | boost + gas right -->
  <div id="controls">
    <div class="steer-pad">
      <div class="ctrl-btn steer-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn steer-btn" id="btnRight">▶</div>
    </div>
    <div class="right-pad">
      <div class="action-btn" id="boostBtn">🔥</div>
      <div class="ctrl-btn gas-btn" id="btnUp"></div>
    </div>
  </div>
</div>

<script>
// ── LAYOUT: phone=portrait(480×800), tablet/desktop=landscape(800×450) ────────
// "phone" = smallest viewport dimension < 500px
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

let W, H, isPhone;
let bgGrad=null, dirtGrad=null;
let pickups=[], particles=[], stars=[];
let player, ai, gameRunning=false, trickTimeout=null, keys={};

function detectLayout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  isPhone = Math.min(vw, vh) < 500;
  if (isPhone) {
    W = 480; H = 800;
    canvas.width  = W; canvas.height = H;
    canvas.style.aspectRatio = '480/800';
  } else {
    W = 800; H = 450;
    canvas.width  = W; canvas.height = H;
    canvas.style.aspectRatio = '800/450';
  }
  // invalidate cached gradients on resize
  bgGrad = null; dirtGrad = null;
  // regenerate stars for new dimensions
  if (stars.length) generateStars();
}
detectLayout();
window.addEventListener('resize', () => { detectLayout(); });

// ── BACK BUTTON ──────────────────────────────────────────────────────────────
(function(){
  const ref = document.referrer, btn = document.getElementById('backBtn');
  if (ref && (ref.includes('index.html') || ref.includes('arcade') || ref === location.origin+'/'))
    btn.style.display = 'inline-flex';
})();

// ── FULLSCREEN ────────────────────────────────────────────────────────────────
const fsBtn = document.getElementById('fsBtn');
if (document.fullscreenEnabled || document.webkitFullscreenEnabled) {
  fsBtn.style.display = 'flex';
  fsBtn.addEventListener('click', () => {
    const el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement)
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    else
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  });
  const onFsChange = () => {
    const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsBtn.textContent = inFs ? '✕ EXIT FULLSCREEN' : '⛶ FULLSCREEN';
  };
  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);
}

// ── GAME CONSTANTS ────────────────────────────────────────────────────────────
const FRICTION=0.91, ACCEL=0.32, TURN_SPD=0.055, MAX_SPD=5.5, BOOST_SPD=9.0;
let difficulty='easy', world='trucks';

const DIFF = {
  easy:  {aiSpeed:0.38,aiBoostChance:0.0, aiOrbitDist:999,aiChargeRange:999,aiReactionDeg:0.22,aiEvadeAt:2,aiBoostDistReq:0,  hitPower:7, wanderChance:0.4, wanderTime:180},
  medium:{aiSpeed:0.78,aiBoostChance:0.005,aiOrbitDist:190,aiChargeRange:380,aiReactionDeg:0.09,aiEvadeAt:5,aiBoostDistReq:300,hitPower:10,wanderChance:0.08,wanderTime:60},
  hard:  {aiSpeed:1.0, aiBoostChance:0.012,aiOrbitDist:150,aiChargeRange:999,aiReactionDeg:0.06,aiEvadeAt:6,aiBoostDistReq:250,hitPower:12,wanderChance:0.0, wanderTime:0},
};

const PICKUP_DEFS = [
  {icon:'🛡️',color:'#4488ff'},
  {icon:'⚡', color:'#ffdd00'},
];


function makeTruck(x,y,angle,isPlayer){
  return{x,y,angle,isPlayer,vx:0,vy:0,hits:0,maxHits:7,invTimer:0,shieldTimer:0,
    boostCharge:0,boostReady:false,boosting:false,knockbackTimer:0,crashFlash:0,w:44,h:60};
}

function resetPickups(){
  if(isPhone){
    // Portrait 480×800 positions
    pickups=[
      {x:160,y:200,type:1,alive:true},
      {x:320,y:200,type:0,alive:true},
      {x:100,y:580,type:0,alive:true},
      {x:380,y:580,type:1,alive:true},
      {x:240,y:400,type:0,alive:true},
    ];
  } else {
    // Landscape 800×450 positions
    pickups=[
      {x:200,y:112,type:1,alive:true},
      {x:600,y:112,type:0,alive:true},
      {x:150,y:338,type:0,alive:true},
      {x:650,y:338,type:1,alive:true},
      {x:400,y:225,type:0,alive:true},
    ];
  }
}

function initGame(){
  if(isPhone){
    player = makeTruck(240, 650, -Math.PI/2, true);
    ai     = makeTruck(240, 150,  Math.PI/2, false);
  } else {
    player = makeTruck(160, 225, 0,        true);
    ai     = makeTruck(640, 225, Math.PI,   false);
  }
  particles=[];keys={};collisionCooldown=0;shakeTimer=0;shakeMag=0;
  resetPickups();generateStars();updateHUD();
}

function generateStars(){
  stars=[];
  for(let i=0;i<120;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,tw:Math.random()*Math.PI*2});
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  const m={'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right','z':'boost','Z':'boost',' ':'power'};
  if(m[e.key]){e.preventDefault();keys[m[e.key]]=true;}
});
document.addEventListener('keyup',e=>{
  const m={'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right','z':'boost','Z':'boost',' ':'power'};
  if(m[e.key])keys[m[e.key]]=false;
});

function bindBtn(id,key){
  const el=document.getElementById(id);if(!el)return;
  const on=e=>{e.preventDefault();if(gameRunning)keys[key]=true;el.classList.add('pressed');};
  const off=e=>{e.preventDefault();keys[key]=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}
function bindBoostBtn(id){
  const el=document.getElementById(id);if(!el)return;
  const on=e=>{e.preventDefault();keys['up']=true;keys['boost']=true;el.classList.add('pressed');};
  const off=e=>{e.preventDefault();keys['up']=false;keys['boost']=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}
bindBtn('btnUp','up');bindBtn('btnLeft','left');bindBtn('btnRight','right');bindBoostBtn('boostBtn');

// ── PHYSICS ───────────────────────────────────────────────────────────────────
function updateTruck(t,fwd,back,left,right,boost){
  if(!t.boostReady&&t.boostCharge>=100)t.boostReady=true;
  if(boost&&t.boostReady&&t.boostCharge>0){
    t.boosting=true;t.boostCharge=Math.max(0,t.boostCharge-1.1);
    if(t.boostCharge<=0){t.boostReady=false;t.boosting=false;}
  }else if(!boost||t.boostCharge<=0){t.boosting=false;}
  const top=t.knockbackTimer>0?999:(t.boosting?BOOST_SPD:MAX_SPD);
  const acc=t.boosting?ACCEL*2.2:ACCEL;
  if(fwd) {t.vx+=Math.sin(t.angle)*acc;t.vy-=Math.cos(t.angle)*acc;}
  if(back){t.vx-=Math.sin(t.angle)*acc*0.6;t.vy+=Math.cos(t.angle)*acc*0.6;}
  if(left) t.angle-=TURN_SPD;
  if(right)t.angle+=TURN_SPD;
  const s=Math.hypot(t.vx,t.vy);
  if(s>top){t.vx*=top/s;t.vy*=top/s;}
  t.vx*=FRICTION;t.vy*=FRICTION;t.x+=t.vx;t.y+=t.vy;
  const hw=t.w/2,hh=t.h/2;
  if(t.x<20+hw){t.x=20+hw;t.vx*=-0.5;}
  if(t.x>W-20-hw){t.x=W-20-hw;t.vx*=-0.5;}
  if(t.y<20+hh){t.y=20+hh;t.vy*=-0.5;}
  if(t.y>H-20-hh){t.y=H-20-hh;t.vy*=-0.5;}
  if(t.shieldTimer>0)t.shieldTimer--;
  if(t.invTimer>0)t.invTimer--;
  if(t.knockbackTimer>0)t.knockbackTimer--;
  if(t.crashFlash>0)t.crashFlash--;
  if(!t.boosting&&t.boostCharge<100)t.boostCharge=Math.min(100,t.boostCharge+0.18);
}

// ── AI ────────────────────────────────────────────────────────────────────────
let aiPhase='wander',aiPhaseTimer=0,aiOrbitDir=1,aiOrbitAngle=0,aiWanderX=240,aiWanderY=400;

function updateAI(){
  aiPhaseTimer--;
  const dist=Math.hypot(player.x-ai.x,player.y-ai.y);
  const D=DIFF[difficulty];
  if(aiPhaseTimer<=0){
    const roll=Math.random();
    if(ai.hits>=D.aiEvadeAt){aiPhase='evade';aiPhaseTimer=90+Math.random()*60;}
    else if(roll<D.wanderChance){aiPhase='wander';aiPhaseTimer=D.wanderTime+Math.random()*60;aiWanderX=60+Math.random()*(W-120);aiWanderY=60+Math.random()*(H-120);}
    else if(dist<D.aiOrbitDist&&ai.invTimer<=0){aiPhase='orbit';aiPhaseTimer=40+Math.random()*60;aiOrbitDir=Math.random()<0.5?1:-1;}
    else{aiPhase='charge';aiPhaseTimer=60+Math.random()*80;}
  }
  let tx,ty;
  if(aiPhase==='evade'){tx=W-player.x;ty=H-player.y;}
  else if(aiPhase==='wander'){
    tx=aiWanderX;ty=aiWanderY;
    if(Math.hypot(ai.x-tx,ai.y-ty)<60){aiWanderX=60+Math.random()*(W-120);aiWanderY=60+Math.random()*(H-120);}
  }else if(aiPhase==='orbit'){
    aiOrbitAngle+=0.04*aiOrbitDir;
    tx=player.x+Math.cos(aiOrbitAngle)*D.aiOrbitDist;
    ty=player.y+Math.sin(aiOrbitAngle)*D.aiOrbitDist;
    if(aiPhaseTimer<=5){aiPhase='charge';aiPhaseTimer=30;}
  }else{tx=player.x;ty=player.y;}
  const ang=Math.atan2(tx-ai.x,-(ty-ai.y));
  let dif=ang-ai.angle;
  while(dif>Math.PI)dif-=Math.PI*2;while(dif<-Math.PI)dif+=Math.PI*2;
  const aiBoost=D.aiBoostChance>0&&aiPhase==='charge'&&ai.boostCharge>=100&&dist<D.aiBoostDistReq&&Math.random()<D.aiBoostChance*60;
  if(aiBoost)ai.boostCharge=0;
  updateTruck(ai,true,false,dif<-D.aiReactionDeg,dif>D.aiReactionDeg,aiBoost);
  const aiMaxSpd=MAX_SPD*D.aiSpeed,aiSpd=Math.hypot(ai.vx,ai.vy);
  if(aiSpd>aiMaxSpd&&ai.knockbackTimer<=0){ai.vx*=aiMaxSpd/aiSpd;ai.vy*=aiMaxSpd/aiSpd;}
}

// ── COMBAT ────────────────────────────────────────────────────────────────────
let shakeTimer=0,shakeMag=0,collisionCooldown=0;

function registerHit(victim,attacker){
  if(victim.invTimer>0||victim.shieldTimer>0)return;
  victim.hits++;victim.invTimer=130;victim.crashFlash=25;
  const dx=victim.x-attacker.x,dy=victim.y-attacker.y,d=Math.max(Math.hypot(dx,dy),1);
  const pw=DIFF[difficulty].hitPower;
  victim.vx=(dx/d)*pw;victim.vy=(dy/d)*pw;
  attacker.vx=-(dx/d)*(pw*0.5);attacker.vy=-(dy/d)*(pw*0.5);
  victim.knockbackTimer=25;attacker.knockbackTimer=15;
  const ov=document.getElementById('flashOverlay');
  if(ov){ov.style.background=victim.isPlayer?'rgba(255,0,0,0.4)':'rgba(0,255,100,0.25)';ov.style.opacity='1';setTimeout(()=>ov.style.opacity='0',150);}
  shakeTimer=20;shakeMag=victim.isPlayer?10:6;
  spawnCrash(victim.x,victim.y,5);updateHUD();
}

function checkCollision(){
  const dx=player.x-ai.x,dy=player.y-ai.y,dist=Math.hypot(dx,dy),minDist=40;
  if(dist<minDist&&dist>0){
    const nx=dx/dist,ny=dy/dist,ov=minDist-dist;
    player.x+=nx*ov*0.5;player.y+=ny*ov*0.5;ai.x-=nx*ov*0.5;ai.y-=ny*ov*0.5;
    const cs=-(player.vx-ai.vx)*nx-(player.vy-ai.vy)*ny;
    if(cs>1.4&&collisionCooldown<=0){
      const pA=player.vx*(-nx)+player.vy*(-ny),aA=ai.vx*nx+ai.vy*ny;
      if(pA>=aA)registerHit(ai,player);else registerHit(player,ai);
      collisionCooldown=12;
    }
  }
  if(collisionCooldown>0)collisionCooldown--;
}

function checkPickups(){
  for(const pu of pickups){
    if(!pu.alive)continue;
    if(Math.hypot(player.x-pu.x,player.y-pu.y)<28){
      pu.alive=false;
      if(pu.type===0){player.shieldTimer=300;showPowerupMsg('🛡️ SHIELD!','#4488ff');}
      else{player.boostCharge=100;showPowerupMsg('⚡ SUPER BOOST!','#ffdd00');}
      spawnPickup(pu.x,pu.y);updateHUD();
      setTimeout(()=>{pu.alive=true;},10000);
    }
  }
}

function showPowerupMsg(text,color){
  const el=document.getElementById('trickAnnounce');
  el.textContent=text;el.style.color=color;el.style.textShadow=`0 0 20px ${color},2px 2px 0 #000`;el.style.opacity='1';
  if(trickTimeout)clearTimeout(trickTimeout);
  trickTimeout=setTimeout(()=>{el.style.opacity='0';el.style.color='#ffdd00';el.style.textShadow='0 0 20px #ffaa00,2px 2px 0 #000';},1200);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD(){
  ['player','ai'].forEach(who=>{
    const t=who==='player'?player:ai;
    const el=document.getElementById(who+'Pips');if(!el)return;
    el.innerHTML='';
    for(let i=0;i<t.maxHits;i++){const p=document.createElement('div');p.className=`pip ${who} ${i<t.hits?'dead':'alive'}`;el.appendChild(p);}
  });
  const bb=document.getElementById('boostBtn');
  if(bb&&player){
    const pct=player.boostCharge/100;
    if(player.boosting){const p=0.7+0.3*Math.sin(Date.now()*0.02);bb.style.opacity='1';bb.style.boxShadow=`0 0 ${24*p}px rgba(255,120,0,${p})`;bb.style.borderColor='#ff8800';}
    else if(player.boostReady){const p=0.8+0.2*Math.sin(Date.now()*0.008);bb.style.opacity='1';bb.style.boxShadow=`0 0 ${20*p}px rgba(255,200,0,${p})`;bb.style.borderColor='#ffdd00';}
    else{bb.style.opacity=(0.2+pct*0.4).toFixed(2);bb.style.boxShadow='none';bb.style.borderColor='#555';}
  }
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnCrash(x,y,spd){
  for(let i=0;i<Math.floor(spd*3+8);i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*spd*0.8+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04+Math.random()*0.04,r:Math.random()*5+2,color:Math.random()<0.5?'#ff4422':'#ffaa00'});
  }
}
function spawnPickup(x,y){for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2;particles.push({x,y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:1,decay:0.05,r:2+Math.random()*3,color:'#00ff88'});}}
function spawnBoost(){
  const tx=player.x-Math.sin(player.angle)*24,ty=player.y+Math.cos(player.angle)*24;
  const colors=['#ff2200','#ff6600','#ffaa00','#ffee00'];
  for(let i=0;i<10;i++)particles.push({x:tx+(Math.random()-0.5)*8,y:ty+(Math.random()-0.5)*8,vx:-Math.sin(player.angle)*(3+Math.random()*4)+(Math.random()-0.5)*0.6,vy:Math.cos(player.angle)*(3+Math.random()*4)+(Math.random()-0.5)*0.6,life:1,decay:0.055+Math.random()*0.03,r:6+Math.random()*7,color:colors[Math.floor(Math.random()*colors.length)]});
}
function updateParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=p.decay;return p.life>0;});}

  for(let gx=20;gx<W-20;gx+=60){ctx.beginPath();ctx.moveTo(gx,20);ctx.lineTo(gx,H-20);ctx.stroke();}
  for(let gy=20;gy<H-20;gy+=60){ctx.beginPath();ctx.moveTo(20,gy);ctx.lineTo(W-20,gy);ctx.stroke();}
  const pulse=0.3+0.15*Math.sin(t*1.8),pulse2=0.2+0.1*Math.sin(t*1.8+Math.PI);
  for(let i=0;i<4;i++){const ins=i*6;ctx.strokeStyle=`rgba(140,80,255,${(pulse*(0.06-i*0.012)).toFixed(3)})`;ctx.lineWidth=18-i*3;ctx.beginPath();ctx.roundRect(20+ins,20+ins,W-40-ins*2,H-40-ins*2,4);ctx.stroke();}
  ctx.strokeStyle=`rgba(160,100,255,${(pulse2*0.35).toFixed(3)})`;ctx.lineWidth=1.5;ctx.shadowColor='rgba(160,80,255,0.6)';ctx.shadowBlur=pulse*18;
  ctx.beginPath();ctx.roundRect(20,20,W-40,H-40,4);ctx.stroke();ctx.shadowBlur=0;
}

function drawPickups(){
  const t=Date.now()*0.003;
  for(const pu of pickups){
    if(!pu.alive)continue;
    const def=PICKUP_DEFS[pu.type];
    ctx.save();ctx.translate(pu.x,pu.y);ctx.rotate(Math.sin(t+pu.x)*0.2);
    const g=ctx.createRadialGradient(0,0,5,0,0,22);g.addColorStop(0,def.color+'44');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=def.color;ctx.lineWidth=2;ctx.shadowColor=def.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(def.icon,0,1);ctx.restore();
  }
}
function drawParticles(){for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}

function drawCanvasHUD(){
  const barW=140,barH=12,barR=6,bx=W/2-barW/2,by=H-26;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(bx,by,barW,barH,barR);ctx.fill();
  const bpct=player.boostCharge/100,bg=ctx.createLinearGradient(bx,0,bx+barW,0);
  bg.addColorStop(0,'#ff4400');bg.addColorStop(1,'#ffdd00');
  ctx.fillStyle=bpct>=1?'#ffee00':bg;ctx.shadowColor=bpct>=1?'#ffee00':'#ff6600';ctx.shadowBlur=bpct>=1?12:3;
  if(bpct>0){ctx.beginPath();ctx.roundRect(bx,by,barW*bpct,barH,barR);ctx.fill();}ctx.shadowBlur=0;
  ctx.fillStyle=bpct>=1?'#ffee00':'rgba(255,255,255,0.55)';
  ctx.font=`bold ${bpct>=1?12:11}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(player.boosting?'🔥 BOOSTING!':bpct>=1?'🔥 READY':'CHARGING...',W/2,by-3);
  if(player.shieldTimer>0){
    const sx=16,sy=H-26,spct=player.shieldTimer/300;
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(sx,sy,barW,barH,barR);ctx.fill();
    const sg=ctx.createLinearGradient(sx,0,sx+barW,0);sg.addColorStop(0,'#2244cc');sg.addColorStop(1,'#88ccff');
    ctx.fillStyle=sg;ctx.shadowColor='#4488ff';ctx.shadowBlur=8;ctx.beginPath();ctx.roundRect(sx,sy,barW*spct,barH,barR);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#88ccff';ctx.font='bold 11px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText(`🛡️ SHIELD  ${Math.ceil(player.shieldTimer/60)}s`,sx,sy-3);
    ctx.globalAlpha=0.35+0.25*Math.sin(Date.now()*0.012);
    ctx.strokeStyle='#4488ff';ctx.lineWidth=3;ctx.shadowColor='#4488ff';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(player.x,player.y,36,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

// ── WIN CHECK ─────────────────────────────────────────────────────────────────
function checkWin(){
  if(player.hits>=player.maxHits||ai.hits>=ai.maxHits){
    gameRunning=false;
    document.body.classList.remove('playing');
    const won=ai.hits>=ai.maxHits;
    const ov=document.getElementById('overlay');
    ov.innerHTML=`<h1 class="${won?'win':'lose'}">${won?'YOU WIN!':'GAME OVER'}</h1>
      <div class="subtitle">${won?(world==='space'?'ALIEN SAUCER VAPORIZED! 💥':'SKULL CRUSHER DESTROYED! 💥'):(world==='space'?'WHITE COMET DESTROYED! 👾':'FLAME BEAST WRECKED! 💀')}</div>
      <div class="world-btns"><div class="world-btn trucks ${world==='trucks'?'selected':''}" data-world="trucks">🛻 TRUCKS</div><div class="world-btn space ${world==='space'?'selected':''}" data-world="space">🚀 SPACE</div></div>
      <div class="diff-btns"><div class="diff-btn easy ${difficulty==='easy'?'selected':''}" data-diff="easy">🟢 EASY</div><div class="diff-btn medium ${difficulty==='medium'?'selected':''}" data-diff="medium">🟡 MEDIUM</div><div class="diff-btn hard ${difficulty==='hard'?'selected':''}" data-diff="hard">🔴 HARD</div></div>
      <button id="startBtn">${won?'PLAY AGAIN 🔥':'TRY AGAIN 💪'}</button>`;
    ov.style.display='flex';
    document.getElementById('startBtn').addEventListener('click',startGame);
    document.querySelectorAll('.world-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.world-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');world=b.dataset.world;});});
    document.querySelectorAll('.diff-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');difficulty=b.dataset.diff;});});
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function gameLoop(){
  if(!gameRunning)return;
  requestAnimationFrame(gameLoop);
  updateTruck(player,keys['up'],keys['down'],keys['left'],keys['right'],keys['boost']);
  updateAI();checkCollision();checkPickups();updateParticles();
  if(player.boosting&&Math.random()<0.5)spawnBoost();
  if(shakeTimer>0){const sx=(Math.random()-0.5)*shakeMag,sy=(Math.random()-0.5)*shakeMag;ctx.save();ctx.translate(sx,sy);shakeTimer--;if(shakeTimer===0)shakeMag=0;}
  if(world==='trucks')drawDirtArena();else drawArena();
  drawPickups();drawParticles();drawTruck(player);drawTruck(ai);drawCanvasHUD();
  if(shakeTimer>0)ctx.restore();
  checkWin();updateHUD();
}

function openPauseMenu(){
  gameRunning=false;
  document.body.classList.remove('playing');
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 class="start">PAUSED</h1>
    <button id="resumeBtn" style="margin-bottom:4px;padding:12px 36px;font-weight:900;font-size:20px;letter-spacing:3px;font-style:italic;background:linear-gradient(135deg,#117733,#22cc55);color:white;border:none;border-radius:12px;cursor:pointer;box-shadow:0 0 20px rgba(34,200,80,0.5);pointer-events:all;">▶ RESUME</button>
    <div class="section-label">CHANGE WORLD</div>
    <div class="world-btns">
      <div class="world-btn trucks ${world==='trucks'?'selected':''}" data-world="trucks">🛻 TRUCKS<br><small>Dirt Arena</small></div>
      <div class="world-btn space ${world==='space'?'selected':''}" data-world="space">🚀 SPACE<br><small>Starship Battle</small></div>
    </div>
    <div class="section-label">CHANGE DIFFICULTY</div>
    <div class="diff-btns">
      <div class="diff-btn easy ${difficulty==='easy'?'selected':''}" data-diff="easy">🟢 EASY</div>
      <div class="diff-btn medium ${difficulty==='medium'?'selected':''}" data-diff="medium">🟡 MEDIUM</div>
      <div class="diff-btn hard ${difficulty==='hard'?'selected':''}" data-diff="hard">🔴 HARD</div>
    </div>
    <button id="startBtn" style="margin-top:4px;padding:10px 28px;font-weight:900;font-size:16px;letter-spacing:2px;font-style:italic;background:rgba(180,30,10,0.6);color:#ffaaaa;border:2px solid #cc3311;border-radius:12px;cursor:pointer;pointer-events:all;">↩ NEW GAME</button>`;
  ov.style.display='flex';
  document.getElementById('resumeBtn').addEventListener('click',()=>{
    ov.style.display='none';
    document.body.classList.add('playing');
    gameRunning=true;
    requestAnimationFrame(gameLoop);
  });
  document.getElementById('startBtn').addEventListener('click',startGame);
  document.querySelectorAll('.world-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.world-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');world=b.dataset.world;});});
  document.querySelectorAll('.diff-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');difficulty=b.dataset.diff;});});
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  document.body.classList.add('playing');
  initGame();gameRunning=true;requestAnimationFrame(gameLoop);
}

document.getElementById('pauseBtn').addEventListener('click',openPauseMenu);
document.querySelectorAll('.world-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.world-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');world=b.dataset.world;const sb=document.getElementById('startBtn');if(sb)sb.textContent=world==='space'?'LAUNCH! 🚀':'SMASH IT! 🛻';});});
document.querySelectorAll('.diff-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');difficulty=b.dataset.diff;});});
document.getElementById('startBtn').addEventListener('click',startGame);

generateStars();
drawDirtArena();
</script>
