<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DESTRUCTION DERBY - Monster Trucks &amp; Spaceships</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#000;
    display:flex;
    align-items:center; justify-content:center;
    width:100vw; height:100vh;
    overflow:hidden;
    font-family:'Trebuchet MS', 'Comic Sans MS', Tahoma, sans-serif;
    touch-action:none;
  }

  /*
   * LAYOUT SYSTEM
   * Portrait:  column layout — HUD top, canvas middle, controls bottom
   * Landscape: row layout   — left-controls | canvas | right-controls
   *            with HUD overlaid at top of canvas
   */

  #gameWrapper {
    position:relative;
    display:flex;
    /* Portrait default */
    flex-direction:column;
    align-items:stretch;
    /* Size: fit the viewport while keeping 3:5 ratio */
    width: min(100vw, calc(100vh * 0.6));
    height: min(100vh, calc(100vw / 0.6));
    max-width: 480px;
    max-height: 800px;
  }

  /* ── PORTRAIT HUD ── */
  #ui {
    flex:0 0 auto;
    width:100%;
    padding:5px 12px 4px;
    display:flex; justify-content:space-between; align-items:flex-start;
    background:rgba(0,0,0,0.55);
    pointer-events:none;
    z-index:10;
  }
  #ui.landscape-hidden { display:none; }

  /* ── CANVAS AREA ── */
  #canvasArea {
    position:relative;
    flex:1 1 auto;
    overflow:hidden;
    min-height:0; min-width:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
  }
  canvas {
    width:auto;
    height:100%;
    max-width:100%;
    aspect-ratio:480/800;
    display:block;
  }

  /* ── HUD OVERLAY (landscape only) ── */
  #hudOverlay {
    display:none;
    position:absolute;
    top:0; left:0; right:0;
    padding:5px 12px 4px;
    justify-content:space-between; align-items:flex-start;
    background:rgba(0,0,0,0.55);
    pointer-events:none;
    z-index:12;
  }
  #hudOverlay.active { display:flex; }

  /* ── PORTRAIT CONTROLS ── */
  #controls {
    flex:0 0 auto;
    padding:8px 12px 10px;
    display:flex; justify-content:space-between; align-items:center;
    background:rgba(0,0,0,0.6);
    pointer-events:none;
  }
  #controls.landscape-hidden { display:none; }

  /* ── LANDSCAPE SIDE PADS ── */
  #leftPad, #rightPad {
    display:none;
    flex:0 0 auto;
    padding:8px;
    background:rgba(0,0,0,0.6);
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  #leftPad.active, #rightPad.active { display:flex; }

  /* shared pad inner layouts */
  .steer-pad { display:flex; flex-direction:row; gap:8px; pointer-events:all; align-items:center; }
  .right-pad  { display:flex; flex-direction:row; gap:10px; align-items:flex-end; pointer-events:all; }

  /* ── PAUSE/MENU ── */
  #menuBtn {
    pointer-events:all;
    background:rgba(0,0,0,0.5);
    border:1.5px solid rgba(255,255,255,0.2);
    border-radius:8px;
    color:rgba(255,255,255,0.7);
    font-size:18px;
    width:32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    align-self:flex-start;
  }
  #menuBtn:active { background:rgba(255,255,255,0.15); }
  #pauseBtn {
    pointer-events:all;
    width:28px; height:28px;
    background:rgba(255,255,255,0.07);
    border:1.5px solid rgba(255,255,255,0.18);
    border-radius:8px;
    color:rgba(255,255,255,0.5);
    font-size:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    align-self:center;
    flex-shrink:0;
  }
  #pauseBtn:active { background:rgba(255,255,255,0.18); color:white; }

  /* ── HUD CONTENT ── */
  .hud-block { display:flex; flex-direction:column; gap:2px; }
  .hud-block.right { align-items:flex-end; }
  .truck-label { font-family:'Trebuchet MS', Tahoma, sans-serif; font-weight:900; font-size:11px; letter-spacing:1px; text-shadow:0 0 8px currentColor; font-style:italic; text-transform:uppercase; }
  .player-label { color:#ff4422; }
  .ai-label { color:#00ff88; }
  .hit-pips { display:flex; gap:3px; margin-top:2px; }
  .pip { width:11px; height:11px; border-radius:50%; border:1.5px solid; transition: transform 0.15s, opacity 0.15s; }
  .pip.alive  { transform:scale(1);   opacity:1; }
  .pip.dead   { transform:scale(0.4); opacity:0.2; }
  .pip.player { background:#ff4422; border-color:#ff8866; box-shadow:0 0 4px #ff4422; }
  .pip.ai     { background:#00ff88; border-color:#88ffcc; box-shadow:0 0 4px #00ff88; }
  .pip.dead.player { background:#333; border-color:#555; box-shadow:none; }
  .pip.dead.ai     { background:#333; border-color:#555; box-shadow:none; }

  /* ── FLASH / ANNOUNCE ── */
  #flashOverlay {
    position:absolute; inset:0; pointer-events:none; z-index:18;
    opacity:0; transition:opacity 0.08s;
  }
  #trickAnnounce {
    position:absolute; top:35%; left:50%; transform:translateX(-50%);
    font-family:'Trebuchet MS', Tahoma, sans-serif; font-weight:900; font-size:28px;
    color:#ffdd00; text-shadow:0 0 20px #ffaa00,2px 2px 0 #000;
    pointer-events:none; z-index:15; opacity:0; white-space:nowrap; transition:opacity 0.3s;
  }
  #combo {
    position:absolute; top:42%; left:50%; transform:translateX(-50%);
    font-size:18px; color:#ff9900; text-shadow:1px 1px 0 #000;
    pointer-events:none; z-index:15; opacity:0; white-space:nowrap;
  }

  /* ── OVERLAY (menu / win / lose) ── */
  #overlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.88); z-index:20; gap:16px;
    text-align:center; box-sizing:border-box;
  }
  #overlay h1 { font-family:'Trebuchet MS', Tahoma, sans-serif; font-weight:900; font-size:48px; letter-spacing:4px; line-height:1; font-style:italic; -webkit-text-stroke:1px rgba(255,255,255,0.3); }
  #overlay .subtitle { font-size:18px; color:#aaa; letter-spacing:2px; text-align:center; padding:0 20px; }
  .win  { color:#ff4422; text-shadow:0 0 20px #ff4422; }
  .lose { color:#00ff88; text-shadow:0 0 20px #00ff88; }
  .start{ color:#ffdd00; text-shadow:0 0 20px #ffdd00; }
  .section-label { font-family:'Trebuchet MS', Tahoma, sans-serif; font-weight:900; font-size:11px; color:#777; letter-spacing:4px; margin-top:14px; margin-bottom:4px; text-transform:uppercase; }
  .world-btns { display:flex; gap:10px; margin-top:4px; justify-content:center; }
  .world-btn {
    padding:10px 16px; border-radius:10px; border:2px solid;
    font-family:'Trebuchet MS', Tahoma, sans-serif; font-weight:900; font-size:14px; cursor:pointer; font-style:italic; letter-spacing:1px;
    pointer-events:all; transition:transform 0.1s, box-shadow 0.1s;
    text-align:center; line-height:1.3;
  }
  .world-btn:active { transform:scale(0.94); }
  .world-btn.trucks { background:rgba(139,90,20,0.25); border-color:#aa6622; color:#ddaa55; }
  .world-btn.space  { background:rgba(40,80,200,0.2);  border-color:#4466cc; color:#88aaff; }
  .world-btn.selected { transform:scale(1.08); box-shadow:0 0 16px currentColor; }
  .diff-btns { display:flex; gap:10px; margin-top:4px; justify-content:center; }
  .diff-btn {
    padding:10px 18px; border-radius:10px; border:2px solid;
    font-family:'Trebuchet MS', Tahoma, sans-serif; font-weight:900; font-size:15px; cursor:pointer; font-style:italic; letter-spacing:1px;
    pointer-events:all; transition:transform 0.1s, box-shadow 0.1s;
  }
  .diff-btn:active { transform:scale(0.94); }
  .diff-btn.easy   { background:rgba(0,200,80,0.2);  border-color:#00cc55; color:#00ff77; }
  .diff-btn.medium { background:rgba(255,180,0,0.2); border-color:#ffaa00; color:#ffcc44; }
  .diff-btn.hard   { background:rgba(220,30,30,0.2); border-color:#cc2222; color:#ff4444; }
  .diff-btn.selected { transform:scale(1.08); box-shadow:0 0 16px currentColor; }
  #startBtn {
    margin-top:8px; padding:14px 40px;
    font-family:'Trebuchet MS', Tahoma, sans-serif; font-weight:900; font-size:22px; letter-spacing:3px; font-style:italic;
    background:linear-gradient(135deg,#cc1111,#ff4422);
    color:white; border:none; border-radius:12px; cursor:pointer;
    box-shadow:0 0 20px rgba(255,68,34,0.5); pointer-events:all;
  }

  /* ── BUTTONS ── */
  .ctrl-btn {
    background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.2);
    border-radius:14px; color:white; font-size:26px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none;
    transition: background 0.08s;
  }
  .ctrl-btn.pressed, .ctrl-btn:active { background:rgba(255,255,255,0.32); border-color:rgba(255,255,255,0.5); }
  .steer-btn { width:72px; height:72px; font-size:30px; }
  .gas-btn   { width:80px; height:80px; background:rgba(0,200,80,0.85) !important; border-color:#00ff66 !important; box-shadow:0 0 16px rgba(0,255,80,0.6) !important; }
  .action-btn {
    border-radius:50%; border:2px solid rgba(255,255,255,0.2); color:white; font-size:24px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none;
  }
  #boostBtn  { width:80px; height:80px; background:rgba(255,100,0,0.35); border-color:#ff6600; box-shadow:0 0 12px rgba(255,100,0,0.5); font-size:32px; }
  #boostBtn2 { width:80px; height:80px; background:rgba(255,100,0,0.35); border-color:#ff6600; box-shadow:0 0 12px rgba(255,100,0,0.5); font-size:32px; }

  /* ── LANDSCAPE LAYOUT ── */
  @media (orientation:landscape) {
    #gameWrapper {
      flex-direction:row;
      /* In landscape: height drives everything. Canvas is 3:5, so width = height*0.6 */
      height: 100vh;
      width: auto;
      max-width: none;
      max-height: none;
    }
    #ui.landscape-hidden { display:none; }
    #controls.landscape-hidden { display:none; }
    #leftPad.active, #rightPad.active { display:flex; flex-direction:column; gap:12px; }
    #canvasArea {
      flex:0 0 auto;
      width: calc(100vh * 0.6);
      height:100vh;
    }
    canvas {
      height:100%;
      width:auto;
    }
    #hudOverlay.active { display:flex; }
  }

  /* Back button (when launched from arcade) */
  #backBtn {
    position:fixed;
    top:10px; left:10px;
    z-index:100;
    background:rgba(0,0,0,0.7);
    border:1.5px solid rgba(255,255,255,0.2);
    border-radius:8px;
    color:rgba(255,255,255,0.6);
    font-size:13px;
    padding:6px 10px;
    cursor:pointer;
    text-decoration:none;
    font-family:'Trebuchet MS', Tahoma, sans-serif;
    display:none; /* shown by JS if referrer is arcade */
  }
  #backBtn:hover { color:white; border-color:rgba(255,255,255,0.5); }
</style>
</head>
<body>

<a id="backBtn" href="index.html">← ARCADE</a>

<div id="gameWrapper">

  <!-- PORTRAIT HUD -->
  <div id="ui">
    <div class="hud-block">
      <div class="truck-label player-label">🔴 FLAME BEAST</div>
      <div class="hit-pips" id="playerPips"></div>
    </div>
    <div id="pauseBtn">⏸</div>
    <div class="hud-block right">
      <div class="truck-label ai-label">💀 SKULL CRUSHER</div>
      <div class="hit-pips" id="aiPips"></div>
    </div>
  </div>

  <!-- LANDSCAPE LEFT PAD: steer -->
  <div id="leftPad">
    <div class="steer-pad">
      <div class="ctrl-btn steer-btn" id="btnLeft2">◀</div>
      <div class="ctrl-btn steer-btn" id="btnRight2">▶</div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvasArea">
    <canvas id="gameCanvas" width="480" height="800"></canvas>
    <div id="flashOverlay"></div>
    <div id="trickAnnounce"></div>

    <!-- LANDSCAPE HUD OVERLAY -->
    <div id="hudOverlay">
      <div class="hud-block">
        <div class="truck-label player-label" id="playerLabelOverlay">🔴 FLAME BEAST</div>
        <div class="hit-pips" id="playerPipsOverlay"></div>
      </div>
      <div id="pauseBtn2" style="pointer-events:all;width:28px;height:28px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.18);border-radius:8px;color:rgba(255,255,255,0.5);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">⏸</div>
      <div class="hud-block right">
        <div class="truck-label ai-label" id="aiLabelOverlay">💀 SKULL CRUSHER</div>
        <div class="hit-pips" id="aiPipsOverlay"></div>
      </div>
    </div>

    <div id="overlay">
      <h1 class="start">DESTRUCTION DERBY</h1>
      <div class="section-label">PICK YOUR WORLD</div>
      <div class="world-btns">
        <div class="world-btn trucks selected" data-world="trucks">🛻 TRUCKS<br><small>Dirt Arena</small></div>
        <div class="world-btn space" data-world="space">🚀 SPACE<br><small>Starship Battle</small></div>
      </div>
      <div class="section-label">DIFFICULTY</div>
      <div class="diff-btns">
        <div class="diff-btn easy selected" data-diff="easy">🟢 EASY</div>
        <div class="diff-btn medium" data-diff="medium">🟡 MEDIUM</div>
        <div class="diff-btn hard" data-diff="hard">🔴 HARD</div>
      </div>
      <button id="startBtn">SMASH IT! 🛻</button>
    </div>
  </div>

  <!-- LANDSCAPE RIGHT PAD: boost + gas -->
  <div id="rightPad">
    <div class="right-pad">
      <div class="action-btn" id="boostBtn2">🔥</div>
      <div class="ctrl-btn gas-btn" id="btnUp2"></div>
    </div>
  </div>

  <!-- PORTRAIT CONTROLS -->
  <div id="controls">
    <div class="steer-pad">
      <div class="ctrl-btn steer-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn steer-btn" id="btnRight">▶</div>
    </div>
    <div class="right-pad">
      <div class="action-btn" id="boostBtn">🔥</div>
      <div class="ctrl-btn gas-btn" id="btnUp"></div>
    </div>
  </div>

</div><!-- end gameWrapper -->

<script>
// ── BACK BUTTON: show if coming from arcade ──────────────────────────────
(function(){
  const ref = document.referrer;
  const el = document.getElementById('backBtn');
  if(ref && (ref.includes('index.html') || ref.includes('arcade') || ref === location.origin + '/')) {
    el.style.display = 'block';
  }
})();

// ── LAYOUT MANAGER ──────────────────────────────────────────────────────────
// Switches HUD / controls between portrait and landscape modes
function applyLayout() {
  const isLandscape = window.innerWidth > window.innerHeight;
  const ui       = document.getElementById('ui');
  const controls = document.getElementById('controls');
  const leftPad  = document.getElementById('leftPad');
  const rightPad = document.getElementById('rightPad');
  const hudOver  = document.getElementById('hudOverlay');

  if(isLandscape) {
    ui.classList.add('landscape-hidden');
    controls.classList.add('landscape-hidden');
    leftPad.classList.add('active');
    rightPad.classList.add('active');
    hudOver.classList.add('active');
  } else {
    ui.classList.remove('landscape-hidden');
    controls.classList.remove('landscape-hidden');
    leftPad.classList.remove('active');
    rightPad.classList.remove('active');
    hudOver.classList.remove('active');
  }
}
applyLayout();
window.addEventListener('resize', applyLayout);
screen.orientation && screen.orientation.addEventListener('change', applyLayout);

// ── CANVAS + CONSTANTS ──────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 800;

const FRICTION  = 0.91;
const ACCEL     = 0.32;
const TURN_SPD  = 0.055;
const MAX_SPD   = 5.5;
const BOOST_SPD = 9.0;

let difficulty = 'easy';
let world = 'trucks';

const DIFF = {
  easy: {
    aiSpeed:0.38, aiBoostChance:0.0, aiOrbitDist:999, aiChargeRange:999,
    aiReactionDeg:0.22, aiEvadeAt:2, aiBoostDistReq:0, hitPower:7,
    wanderChance:0.4, wanderTime:180,
  },
  medium: {
    wanderChance:0.08, wanderTime:60, aiSpeed:0.78, aiBoostChance:0.005,
    aiOrbitDist:170, aiChargeRange:350, aiReactionDeg:0.09, aiEvadeAt:5,
    aiBoostDistReq:280, hitPower:10,
  },
  hard: {
    wanderChance:0.0, wanderTime:0, aiSpeed:1.0, aiBoostChance:0.012,
    aiOrbitDist:130, aiChargeRange:999, aiReactionDeg:0.06, aiEvadeAt:6,
    aiBoostDistReq:220, hitPower:12,
  },
};

const PICKUP_DEFS = [
  {icon:'🛡️', label:'SHIELD',      color:'#4488ff', glowColor:'rgba(68,136,255,0.3)'},
  {icon:'⚡',  label:'SUPER BOOST', color:'#ffdd00', glowColor:'rgba(255,220,0,0.3)'},
];

let pickups=[], particles=[], stars=[];
let player, ai, gameRunning=false, trickTimeout=null;
let keys={};

function makeTruck(x,y,angle,isPlayer) {
  return {x,y,angle,isPlayer,vx:0,vy:0,
    hits:0,maxHits:7,invTimer:0,
    airborne:false,airTimer:0,
    shieldTimer:0,
    boostCharge:0,boostReady:false,boosting:false,
    knockbackTimer:0,crashFlash:0,w:44,h:60};
}

function resetPickups() {
  pickups=[
    {x:160,y:200,type:1,alive:true},
    {x:320,y:200,type:0,alive:true},
    {x:100,y:580,type:0,alive:true},
    {x:380,y:580,type:1,alive:true},
    {x:240,y:400,type:0,alive:true},
  ];
}

function initGame() {
  player=makeTruck(240,650,-Math.PI/2,true);
  ai=makeTruck(240,150,Math.PI/2,false);
  particles=[]; keys={}; collisionCooldown=0; shakeTimer=0; shakeMag=0;
  resetPickups(); generateStars(); updateHUD();
}

function generateStars() {
  stars=[];
  for(let i=0;i<120;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,tw:Math.random()*Math.PI*2});
}

// ── INPUT ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  const m={'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right','z':'boost','Z':'boost','x':'power',' ':'power'};
  if(m[e.key]){e.preventDefault();keys[m[e.key]]=true;}
});
document.addEventListener('keyup',e=>{
  const m={'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right','z':'boost','Z':'boost','x':'power',' ':'power'};
  if(m[e.key]) keys[m[e.key]]=false;
});

function bindBtn(id, key) {
  const el=document.getElementById(id); if(!el) return;
  const on =e=>{e.preventDefault();if(gameRunning)keys[key]=true; el.classList.add('pressed');};
  const off=e=>{e.preventDefault();keys[key]=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
}

function bindBoostBtn(id) {
  const el=document.getElementById(id); if(!el) return;
  const on =e=>{e.preventDefault();keys['up']=true;keys['boost']=true;el.classList.add('pressed');};
  const off=e=>{e.preventDefault();keys['up']=false;keys['boost']=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
}

// Bind portrait controls
bindBtn('btnUp','up');
bindBtn('btnLeft','left');
bindBtn('btnRight','right');
bindBoostBtn('boostBtn');

// Bind landscape controls
bindBtn('btnUp2','up');
bindBtn('btnLeft2','left');
bindBtn('btnRight2','right');
bindBoostBtn('boostBtn2');

// ── PHYSICS ──────────────────────────────────────────────────────────────────
function updateTruck(t,fwd,back,left,right,boost) {
  if(!t.boostReady && t.boostCharge>=100) t.boostReady=true;
  if(boost && t.boostReady && t.boostCharge>0){
    t.boosting=true;
    t.boostCharge=Math.max(0,t.boostCharge-1.1);
    if(t.boostCharge<=0){t.boostReady=false;t.boosting=false;}
  } else if(!boost || t.boostCharge<=0){
    t.boosting=false;
  }
  const top = t.knockbackTimer>0 ? 999 : (t.boosting ? BOOST_SPD : MAX_SPD);
  const acc = t.boosting ? ACCEL*2.2 : ACCEL;
  if(fwd)  {t.vx+=Math.sin(t.angle)*acc; t.vy-=Math.cos(t.angle)*acc;}
  if(back) {t.vx-=Math.sin(t.angle)*acc*0.6; t.vy+=Math.cos(t.angle)*acc*0.6;}
  if(left)  t.angle-=TURN_SPD;
  if(right) t.angle+=TURN_SPD;
  const s=Math.hypot(t.vx,t.vy);
  if(s>top){t.vx*=top/s;t.vy*=top/s;}
  t.vx*=FRICTION;t.vy*=FRICTION;t.x+=t.vx;t.y+=t.vy;
  const hw=t.w/2,hh=t.h/2;
  if(t.x<20+hw){t.x=20+hw;t.vx*=-0.5;}
  if(t.x>W-20-hw){t.x=W-20-hw;t.vx*=-0.5;}
  if(t.y<20+hh){t.y=20+hh;t.vy*=-0.5;}
  if(t.y>H-20-hh){t.y=H-20-hh;t.vy*=-0.5;}
  if(t.shieldTimer>0)t.shieldTimer--;
  if(t.invTimer>0)t.invTimer--;
  if(t.knockbackTimer>0)t.knockbackTimer--;
  if(t.crashFlash>0)t.crashFlash--;
  if(!t.boosting && t.boostCharge<100) t.boostCharge=Math.min(100,t.boostCharge+0.18);
}

// ── AI ───────────────────────────────────────────────────────────────────────
let aiPhase='wander', aiPhaseTimer=0, aiOrbitDir=1, aiOrbitAngle=0;
let aiWanderX=240, aiWanderY=400;

function updateAI() {
  aiPhaseTimer--;
  const distToPlayer = Math.hypot(player.x-ai.x, player.y-ai.y);
  const D = DIFF[difficulty];

  if(aiPhaseTimer<=0){
    const roll = Math.random();
    if(ai.hits>=D.aiEvadeAt){
      aiPhase='evade'; aiPhaseTimer=90+Math.random()*60;
    } else if(roll < D.wanderChance){
      aiPhase='wander'; aiPhaseTimer=D.wanderTime+Math.random()*60;
      aiWanderX=60+Math.random()*(W-120);
      aiWanderY=60+Math.random()*(H-120);
    } else if(distToPlayer<D.aiOrbitDist && ai.invTimer<=0){
      aiPhase='orbit'; aiPhaseTimer=40+Math.random()*60;
      aiOrbitDir=Math.random()<0.5?1:-1;
    } else {
      aiPhase='charge'; aiPhaseTimer=60+Math.random()*80;
    }
  }

  let tx,ty;
  if(aiPhase==='evade'){
    tx=W-player.x; ty=H-player.y;
  } else if(aiPhase==='wander'){
    tx=aiWanderX; ty=aiWanderY;
    if(Math.hypot(ai.x-tx,ai.y-ty)<60){
      aiWanderX=60+Math.random()*(W-120);
      aiWanderY=60+Math.random()*(H-120);
    }
  } else if(aiPhase==='orbit'){
    aiOrbitAngle+=0.04*aiOrbitDir;
    const orbitR=D.aiOrbitDist;
    tx=player.x+Math.cos(aiOrbitAngle)*orbitR;
    ty=player.y+Math.sin(aiOrbitAngle)*orbitR;
    if(aiPhaseTimer<=5){aiPhase='charge';aiPhaseTimer=30;}
  } else {
    tx=player.x; ty=player.y;
  }

  const ang=Math.atan2(tx-ai.x,-(ty-ai.y));
  let diff=ang-ai.angle;
  while(diff>Math.PI)diff-=Math.PI*2;
  while(diff<-Math.PI)diff+=Math.PI*2;

  const aiBoost=D.aiBoostChance>0&&aiPhase==='charge'&&ai.boostCharge>=100&&distToPlayer<D.aiBoostDistReq&&Math.random()<D.aiBoostChance*60;
  if(aiBoost) ai.boostCharge=0;
  updateTruck(ai,true,false,diff<-D.aiReactionDeg,diff>D.aiReactionDeg,aiBoost);
  const aiMaxSpd=MAX_SPD*D.aiSpeed;
  const aiSpd=Math.hypot(ai.vx,ai.vy);
  if(aiSpd>aiMaxSpd && ai.knockbackTimer<=0){ai.vx*=aiMaxSpd/aiSpd;ai.vy*=aiMaxSpd/aiSpd;}
}

// ── COMBAT ────────────────────────────────────────────────────────────────────
let shakeTimer=0, shakeMag=0;

function registerHit(victim, attacker) {
  if(victim.invTimer>0 || victim.shieldTimer>0) return;
  victim.hits++;
  victim.invTimer=130;
  victim.crashFlash=25;
  const dx=victim.x-attacker.x, dy=victim.y-attacker.y;
  const dist=Math.max(Math.hypot(dx,dy),1);
  const power=DIFF[difficulty].hitPower;
  victim.vx=(dx/dist)*power;
  victim.vy=(dy/dist)*power;
  attacker.vx=-(dx/dist)*(power*0.5);
  attacker.vy=-(dy/dist)*(power*0.5);
  victim.knockbackTimer=25;
  attacker.knockbackTimer=15;
  const overlay=document.getElementById('flashOverlay');
  if(overlay){
    overlay.style.background=victim.isPlayer?'rgba(255,0,0,0.4)':'rgba(0,255,100,0.25)';
    overlay.style.opacity='1';
    setTimeout(()=>{overlay.style.opacity='0';},150);
  }
  shakeTimer=20; shakeMag=victim.isPlayer?10:6;
  spawnCrash(victim.x,victim.y,5);
  updateHUD();
}

let collisionCooldown=0;
function checkCollision() {
  const dx=player.x-ai.x, dy=player.y-ai.y, dist=Math.hypot(dx,dy);
  const minDist=40;
  if(dist<minDist && dist>0){
    const nx=dx/dist, ny=dy/dist;
    const overlap=minDist-dist;
    player.x+=nx*overlap*0.5; player.y+=ny*overlap*0.5;
    ai.x-=nx*overlap*0.5;     ai.y-=ny*overlap*0.5;
    const relVx=player.vx-ai.vx, relVy=player.vy-ai.vy;
    const closingSpeed=-(relVx*nx+relVy*ny);
    if(closingSpeed>1.4 && collisionCooldown<=0){
      const playerAttacking=(player.vx*(-nx)+player.vy*(-ny));
      const aiAttacking=(ai.vx*(nx)+ai.vy*(ny));
      if(playerAttacking>=aiAttacking) registerHit(ai,player);
      else registerHit(player,ai);
      collisionCooldown=12;
    }
  }
  if(collisionCooldown>0) collisionCooldown--;
}

function checkPickups() {
  for(const pu of pickups){
    if(!pu.alive) continue;
    if(Math.hypot(player.x-pu.x,player.y-pu.y)<28){
      pu.alive=false;
      if(pu.type===0){
        player.shieldTimer=300;
        showPowerupMsg('🛡️ SHIELD!','#4488ff');
      } else {
        player.boostCharge=100;
        showPowerupMsg('⚡ SUPER BOOST!','#ffdd00');
      }
      spawnPickup(pu.x,pu.y);
      updateHUD();
      setTimeout(()=>{pu.alive=true;},10000);
    }
  }
}

function showPowerupMsg(text,color) {
  const el=document.getElementById('trickAnnounce');
  el.textContent=text; el.style.color=color;
  el.style.textShadow=`0 0 20px ${color}, 2px 2px 0 #000`;
  el.style.opacity='1';
  if(trickTimeout) clearTimeout(trickTimeout);
  trickTimeout=setTimeout(()=>{
    el.style.opacity='0';
    el.style.color='#ffdd00';
    el.style.textShadow='0 0 20px #ffaa00, 2px 2px 0 #000';
  },1200);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  // Update both portrait and landscape pips
  [['player','playerPips'],['ai','aiPips'],
   ['player','playerPipsOverlay'],['ai','aiPipsOverlay']].forEach(([who,id])=>{
    const t=who==='player'?player:ai;
    const el=document.getElementById(id); if(!el) return;
    el.innerHTML='';
    for(let i=0;i<t.maxHits;i++){
      const pip=document.createElement('div');
      pip.className=`pip ${who} ${i<t.hits?'dead':'alive'}`;
      el.appendChild(pip);
    }
  });

  // Sync boost button visuals for both portrait and landscape
  ['boostBtn','boostBtn2'].forEach(id=>{
    const bb=document.getElementById(id); if(!bb||!player) return;
    const pct=player.boostCharge/100;
    if(player.boosting){
      const pulse=0.7+0.3*Math.sin(Date.now()*0.02);
      bb.style.opacity='1';
      bb.style.boxShadow=`0 0 ${24*pulse}px rgba(255,120,0,${pulse})`;
      bb.style.borderColor='#ff8800';
    } else if(player.boostReady){
      const pulse=0.8+0.2*Math.sin(Date.now()*0.008);
      bb.style.opacity='1';
      bb.style.boxShadow=`0 0 ${20*pulse}px rgba(255,200,0,${pulse})`;
      bb.style.borderColor='#ffdd00';
    } else {
      bb.style.opacity=(0.2+pct*0.4).toFixed(2);
      bb.style.boxShadow='none';
      bb.style.borderColor='#555';
    }
  });
}

function spawnCrash(x,y,spd){
  for(let i=0;i<Math.floor(spd*3+8);i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*spd*0.8+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04+Math.random()*0.04,r:Math.random()*5+2,color:Math.random()<0.5?'#ff4422':'#ffaa00'});
  }
}
function spawnPickup(x,y){
  for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2;particles.push({x,y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:1,decay:0.05,r:2+Math.random()*3,color:'#00ff88'});}
}
function spawnBoost(){
  const tailX=player.x-Math.sin(player.angle)*24;
  const tailY=player.y+Math.cos(player.angle)*24;
  const colors=['#ff2200','#ff6600','#ffaa00','#ffee00'];
  for(let i=0;i<10;i++){
    const spread=0.6;
    const bvx=-Math.sin(player.angle)*(3+Math.random()*4)+(Math.random()-0.5)*spread;
    const bvy= Math.cos(player.angle)*(3+Math.random()*4)+(Math.random()-0.5)*spread;
    particles.push({
      x:tailX+(Math.random()-0.5)*8,y:tailY+(Math.random()-0.5)*8,
      vx:bvx,vy:bvy,life:1,decay:0.055+Math.random()*0.03,
      r:6+Math.random()*7,color:colors[Math.floor(Math.random()*colors.length)]
    });
  }
}
function updateParticles(){
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=p.decay;return p.life>0;});
}

  ctx.strokeStyle='rgba(80,100,180,0.04)';ctx.lineWidth=1;
  for(let gx=20;gx<W-20;gx+=60){ctx.beginPath();ctx.moveTo(gx,20);ctx.lineTo(gx,H-20);ctx.stroke();}
  for(let gy=20;gy<H-20;gy+=60){ctx.beginPath();ctx.moveTo(20,gy);ctx.lineTo(W-20,gy);ctx.stroke();}
  const pulse=0.3+0.15*Math.sin(t*1.8);
  const pulse2=0.2+0.1*Math.sin(t*1.8+Math.PI);
  for(let i=0;i<4;i++){const inset=i*6;const alpha=(pulse*(0.06-i*0.012));ctx.strokeStyle=`rgba(140,80,255,${alpha.toFixed(3)})`;ctx.lineWidth=18-i*3;ctx.beginPath();ctx.roundRect(20+inset,20+inset,W-40-inset*2,H-40-inset*2,4);ctx.stroke();}
  ctx.strokeStyle=`rgba(160,100,255,${(pulse2*0.35).toFixed(3)})`;ctx.lineWidth=1.5;ctx.shadowColor='rgba(160,80,255,0.6)';ctx.shadowBlur=pulse*18;
  ctx.beginPath();ctx.roundRect(20,20,W-40,H-40,4);ctx.stroke();ctx.shadowBlur=0;
}

// ── DRAW: SHIPS ───────────────────────────────────────────────────────────────
function drawPlayerShip() {
  const aura=ctx.createRadialGradient(0,0,10,0,0,38);
  aura.addColorStop(0,'rgba(180,220,255,0.15)');aura.addColorStop(1,'rgba(180,220,255,0)');
  ctx.fillStyle=aura;ctx.beginPath();ctx.ellipse(0,0,38,38,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ddeeff';
  ctx.beginPath();ctx.moveTo(0,-32);ctx.bezierCurveTo(12,-20,16,0,14,14);ctx.lineTo(8,22);ctx.lineTo(18,30);ctx.lineTo(4,20);ctx.lineTo(0,28);ctx.lineTo(-4,20);ctx.lineTo(-18,30);ctx.lineTo(-8,22);ctx.lineTo(-14,14);ctx.bezierCurveTo(-16,0,-12,-20,0,-32);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.moveTo(0,-32);ctx.bezierCurveTo(6,-22,8,-6,6,10);ctx.lineTo(0,16);ctx.lineTo(-6,10);ctx.bezierCurveTo(-8,-6,-6,-22,0,-32);ctx.closePath();ctx.fill();
  ctx.fillStyle='#0033aa';ctx.shadowColor='#66aaff';ctx.shadowBlur=8;ctx.beginPath();ctx.ellipse(0,-10,5,8,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(150,220,255,0.7)';ctx.beginPath();ctx.ellipse(-1,-12,2.5,4,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(150,210,255,0.6)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(6,14);ctx.lineTo(16,27);ctx.stroke();ctx.beginPath();ctx.moveTo(-6,14);ctx.lineTo(-16,27);ctx.stroke();ctx.beginPath();ctx.moveTo(8,18);ctx.lineTo(15,28);ctx.stroke();ctx.beginPath();ctx.moveTo(-8,18);ctx.lineTo(-15,28);ctx.stroke();
  ctx.fillStyle='rgba(100,180,255,0.9)';ctx.shadowColor='#66aaff';ctx.shadowBlur=12;ctx.beginPath();ctx.ellipse(0,25,5,4,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#0033aa';ctx.strokeStyle='#88ccff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,6,7,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#ffffff';ctx.font='bold 9px Righteous';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('1',0,7);
}

function drawAIShip() {
  const aura=ctx.createRadialGradient(0,0,8,0,0,36);
  aura.addColorStop(0,'rgba(0,255,80,0.2)');aura.addColorStop(1,'rgba(0,255,80,0)');
  ctx.fillStyle=aura;ctx.beginPath();ctx.ellipse(0,0,36,36,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#22aa44';ctx.lineWidth=3;ctx.lineCap='round';
  const tentacles=[[-22,18,-28,34],[-12,22,-14,38],[0,24,0,40],[12,22,14,38],[22,18,28,34]];
  for(const [x1,y1,x2,y2] of tentacles){
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(x1+(x2-x1)*0.2+(Math.sin(Date.now()*0.003+x1)*3),(y1+y2)/2,x2,y2);ctx.stroke();
    ctx.fillStyle='#00ff66';ctx.beginPath();ctx.arc(x2,y2,2.5,0,Math.PI*2);ctx.fill();
  }
  const domeGrad=ctx.createRadialGradient(-4,-18,2,0,-10,22);
  domeGrad.addColorStop(0,'#aaffcc');domeGrad.addColorStop(0.5,'#33cc66');domeGrad.addColorStop(1,'#116633');
  ctx.fillStyle=domeGrad;ctx.beginPath();ctx.ellipse(0,-8,18,20,0,0,Math.PI*2);ctx.fill();
  const rimGrad=ctx.createLinearGradient(0,-4,0,14);
  rimGrad.addColorStop(0,'#44dd88');rimGrad.addColorStop(1,'#115522');
  ctx.fillStyle=rimGrad;ctx.beginPath();ctx.ellipse(0,6,28,10,0,0,Math.PI*2);ctx.fill();
  const t=Date.now()*0.004;
  for(let i=0;i<6;i++){const a=t+i*(Math.PI*2/6);const lx=Math.cos(a)*22,ly=6+Math.sin(a)*5;ctx.fillStyle=i%2===0?'#ffff44':'#ff8800';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(lx,ly,2.5,0,Math.PI*2);ctx.fill();}
  ctx.shadowBlur=0;
  ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,-8,8,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff2200';ctx.shadowColor='#ff0000';ctx.shadowBlur=8;ctx.beginPath();ctx.ellipse(0,-8,5,6,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,-8,2.5,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.ellipse(-2,-11,1.5,2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,255,100,0.6)';ctx.shadowColor='#00ff66';ctx.shadowBlur=10;ctx.beginPath();ctx.ellipse(0,14,10,4,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}

function drawPickups() {
  const t=Date.now()*0.003;
  for(const pu of pickups){
    if(!pu.alive)continue;
    const def=PICKUP_DEFS[pu.type];
    ctx.save();ctx.translate(pu.x,pu.y);ctx.rotate(Math.sin(t+pu.x)*0.2);
    const g=ctx.createRadialGradient(0,0,5,0,0,22);
    g.addColorStop(0,def.color+'44');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=def.color;ctx.lineWidth=2;ctx.shadowColor=def.color;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(def.icon,0,1);
    ctx.restore();
  }
}

function drawParticles() {
  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}

function drawCanvasHUD() {
  const barW=140,barH=12,barR=6;
  const bx=W/2-barW/2,by=H-28;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(bx,by,barW,barH,barR);ctx.fill();
  const bpct=player.boostCharge/100;
  const bgrad=ctx.createLinearGradient(bx,0,bx+barW,0);
  bgrad.addColorStop(0,'#ff4400');bgrad.addColorStop(1,'#ffdd00');
  ctx.fillStyle=bpct>=1?'#ffee00':bgrad;
  ctx.shadowColor=bpct>=1?'#ffee00':'#ff6600';ctx.shadowBlur=bpct>=1?12:3;
  if(bpct>0){ctx.beginPath();ctx.roundRect(bx,by,barW*bpct,barH,barR);ctx.fill();}
  ctx.shadowBlur=0;
  ctx.fillStyle=bpct>=1?'#ffee00':'rgba(255,255,255,0.55)';
  ctx.font=`bold ${bpct>=1?12:11}px Righteous`;ctx.textAlign='center';ctx.textBaseline='bottom';
  const boostLabel=player.boosting?'🔥 BOOSTING!':bpct>=1?'🔥 READY':'CHARGING...';
  ctx.fillText(boostLabel,W/2,by-3);

  if(player.shieldTimer>0){
    const sx=16,sy=H-28;
    const spct=player.shieldTimer/300;
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(sx,sy,barW,barH,barR);ctx.fill();
    const sgrad=ctx.createLinearGradient(sx,0,sx+barW,0);
    sgrad.addColorStop(0,'#2244cc');sgrad.addColorStop(1,'#88ccff');
    ctx.fillStyle=sgrad;ctx.shadowColor='#4488ff';ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect(sx,sy,barW*spct,barH,barR);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#88ccff';ctx.font='bold 11px Righteous';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText(`🛡️ SHIELD  ${Math.ceil(player.shieldTimer/60)}s`,sx,sy-3);
    ctx.globalAlpha=0.35+0.25*Math.sin(Date.now()*0.012);
    ctx.strokeStyle='#4488ff';ctx.lineWidth=3;ctx.shadowColor='#4488ff';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(player.x,player.y,36,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

// ── WIN CHECK ─────────────────────────────────────────────────────────────────
function checkWin() {
  if(player.hits>=player.maxHits||ai.hits>=ai.maxHits){
    gameRunning=false;
    const won=ai.hits>=ai.maxHits;
    const ov=document.getElementById('overlay');
    ov.innerHTML=`<h1 class="${won?'win':'lose'}">${won?'YOU WIN!':'GAME OVER'}</h1>
      <div class="subtitle">${won?(world==='space'?'ALIEN SAUCER VAPORIZED! 💥':'SKULL CRUSHER DESTROYED! 💥'):(world==='space'?'WHITE COMET DESTROYED! 👾':'FLAME BEAST WRECKED! 💀')}</div>
      <div class="world-btns" style="justify-content:center">
        <div class="world-btn trucks ${world==='trucks'?'selected':''}" data-world="trucks">🛻 TRUCKS</div>
        <div class="world-btn space ${world==='space'?'selected':''}" data-world="space">🚀 SPACE</div>
      </div>
      <div class="diff-btns" style="justify-content:center">
        <div class="diff-btn easy ${difficulty==='easy'?'selected':''}" data-diff="easy">🟢 EASY</div>
        <div class="diff-btn medium ${difficulty==='medium'?'selected':''}" data-diff="medium">🟡 MEDIUM</div>
        <div class="diff-btn hard ${difficulty==='hard'?'selected':''}" data-diff="hard">🔴 HARD</div>
      </div>
      <button id="startBtn">${won?'PLAY AGAIN 🔥':'TRY AGAIN 💪'}</button>`;
    ov.style.display='flex';
    document.getElementById('startBtn').addEventListener('click',startGame);
    document.querySelectorAll('.world-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.world-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');world=btn.dataset.world;});});
    document.querySelectorAll('.diff-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');difficulty=btn.dataset.diff;});});
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function gameLoop() {
  if(!gameRunning)return;
  requestAnimationFrame(gameLoop);
  updateTruck(player,keys['up'],keys['down'],keys['left'],keys['right'],keys['boost']);
  updateAI();
  checkCollision();checkPickups();updateParticles();
  if(player.boosting&&Math.random()<0.5) spawnBoost();

  if(shakeTimer>0){
    const sx=(Math.random()-0.5)*shakeMag,sy=(Math.random()-0.5)*shakeMag;
    ctx.save();ctx.translate(sx,sy);
    shakeTimer--;if(shakeTimer===0)shakeMag=0;
  }
  if(world==="trucks")drawDirtArena();else drawArena();
  drawPickups();drawParticles();
  drawTruck(player);drawTruck(ai);
  drawCanvasHUD();
  if(shakeTimer>0)ctx.restore();
  checkWin();
  updateHUD(); // keep boost glow synced every frame
}

function openPauseMenu() {
  gameRunning=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 class="start">DESTRUCTION DERBY</h1>
    <div class="section-label">PICK YOUR WORLD</div>
    <div class="world-btns">
      <div class="world-btn trucks ${world==='trucks'?'selected':''}" data-world="trucks">🛻 TRUCKS<br><small>Dirt Arena</small></div>
      <div class="world-btn space ${world==='space'?'selected':''}" data-world="space">🚀 SPACE<br><small>Starship Battle</small></div>
    </div>
    <div class="section-label">DIFFICULTY</div>
    <div class="diff-btns">
      <div class="diff-btn easy ${difficulty==='easy'?'selected':''}" data-diff="easy">🟢 EASY</div>
      <div class="diff-btn medium ${difficulty==='medium'?'selected':''}" data-diff="medium">🟡 MEDIUM</div>
      <div class="diff-btn hard ${difficulty==='hard'?'selected':''}" data-diff="hard">🔴 HARD</div>
    </div>
    <button id="startBtn">SMASH IT! 🛻</button>
  `;
  ov.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',startGame);
  document.querySelectorAll('.world-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.world-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');world=btn.dataset.world;document.getElementById('startBtn').textContent=world==='space'?'LAUNCH! 🚀':'SMASH IT! 🛻';});});
  document.querySelectorAll('.diff-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');difficulty=btn.dataset.diff;});});
}

function startGame() {
  document.getElementById('overlay').style.display='none';
  const playerLabel=world==='space'?'⚪ WHITE COMET':'🔴 FLAME BEAST';
  const aiLabel=world==='space'?'👾 ALIEN SAUCER':'💀 SKULL CRUSHER';
  // update both portrait and landscape labels
  ['playerLabel','playerLabelOverlay'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=playerLabel;});
  document.querySelector('.player-label').textContent=playerLabel;
  ['aiLabel','aiLabelOverlay'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=aiLabel;});
  document.querySelector('.ai-label').textContent=aiLabel;
  initGame();gameRunning=true;requestAnimationFrame(gameLoop);
}

// Bind pause buttons (portrait + landscape)
document.getElementById('pauseBtn').addEventListener('click',openPauseMenu);
document.getElementById('pauseBtn2').addEventListener('click',openPauseMenu);

// World / difficulty on title screen
document.querySelectorAll('.world-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.world-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');world=btn.dataset.world;const sb=document.getElementById('startBtn');if(sb)sb.textContent=world==='space'?'LAUNCH! 🚀':'SMASH IT! 🛻';});});
document.querySelectorAll('.diff-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');difficulty=btn.dataset.diff;});});
document.getElementById('startBtn').addEventListener('click',startGame);

// Title screen preview
generateStars();
drawDirtArena();
</script>
